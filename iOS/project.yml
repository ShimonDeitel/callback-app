name: CallbackFollowupLog
options:
  bundleIdPrefix: com.shimondeitel.callbacklog
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  CallbackFollowupLog:
    type: application
    platform: iOS
    sources:
      - path: CallbackFollowupLog
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.callbacklog
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: CallbackFollowupLog/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  CallbackFollowupLogTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: CallbackFollowupLogTests
    dependencies:
      - target: CallbackFollowupLog
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.callbacklog.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  CallbackFollowupLogUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: CallbackFollowupLogUITests
    dependencies:
      - target: CallbackFollowupLog
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.callbacklog.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  CallbackFollowupLog:
    build:
      targets:
        CallbackFollowupLog: all
        CallbackFollowupLogTests: [test]
        CallbackFollowupLogUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: CallbackFollowupLog.storekit
    test:
      config: Debug
      storeKitConfiguration: CallbackFollowupLog.storekit
      targets:
        - CallbackFollowupLogTests
        - CallbackFollowupLogUITests
    archive:
      config: Release
